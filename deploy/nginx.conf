# ============================================================
# OnboardAgent Nginx 配置
# 部署步骤见 deploy/README.md
# ============================================================

upstream onboard_backend {
    # FastAPI 后端（Gunicorn + Uvicorn workers）
    server 127.0.0.1:8000;
}

# HTTP → HTTPS 重定向（如果没有 SSL 证书，可以注释掉这个 server 块）
server {
    listen 80;
    server_name your-domain.com www.your-domain.com;

    # 阿里云免费 SSL 证书申请后取消下面注释
    # return 301 https://$host$request_uri;

    # 没有域名/SSL 时，直接从这里提供服务（注释掉上面 return 行即可）
    root /opt/onboardagent/frontend/dist;
    index index.html;

    # 前端静态文件
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 反向代理（HTTP）
    location /api/ {
        proxy_pass http://onboard_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 上传文件大小限制
        client_max_body_size 20M;
    }

    # WebSocket 反向代理
    location /ws/ {
        proxy_pass http://onboard_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 超时（聊天长连接）
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}

